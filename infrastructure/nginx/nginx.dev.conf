# Nginx DEV config — services run on the host (npm start), nginx in docker
# routes through host.docker.internal.
# For production / full-docker setup, use nginx.conf (service-name upstreams).
#
# Same routing rules as nginx.conf, just different upstreams.

upstream storage_service       { server host.docker.internal:3003; keepalive 16; }
upstream web_api_service       { server host.docker.internal:3006; keepalive 16; }
upstream auth_service          { server host.docker.internal:3002; keepalive 16; }
upstream config_service        { server host.docker.internal:3005; keepalive 16; }
upstream comic_service         { server host.docker.internal:3001; keepalive 32; }
upstream notification_service  { server host.docker.internal:3004; keepalive 16; }
upstream post_service          { server host.docker.internal:3007; keepalive 16; }
upstream iam_service           { server host.docker.internal:3008; keepalive 16; }
upstream introduction_service  { server host.docker.internal:3010; keepalive 16; }
upstream marketing_service     { server host.docker.internal:3009; keepalive 16; }

limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=60r/s;

map $http_x_correlation_id $sanitized_correlation_id {
    default          $request_id;
    "~^[A-Za-z0-9._-]{1,128}$" $http_x_correlation_id;
}

# Dev: trust X-Forwarded-* from anywhere (single dev box, no public exposure)
real_ip_header X-Forwarded-For;
real_ip_recursive on;
set_real_ip_from 0.0.0.0/0;

server {
    listen 80;
    server_name _;
    server_tokens off;
    client_max_body_size 1m;

    include /etc/nginx/snippets/security_headers.conf;

    location /api/v1/upload/ {
        client_max_body_size 11m;
        limit_req zone=upload_limit burst=5 nodelay;
        proxy_pass http://storage_service;
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /.well-known/jwks.json {
        proxy_pass http://auth_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    location = /api/v1/homepage {
        proxy_pass http://web_api_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    location ~ ^/api/v1/(auth|users)/ {
        proxy_pass http://auth_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    location ~ ^/api/v1/(roles|permissions|groups|contexts|rbac|user-roles)/ {
        proxy_pass http://iam_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    location ~ ^/api/v1/(config|menus|countries|provinces|wards)/ {
        proxy_pass http://config_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    location ~ ^/api/v1/(admin|public|user)/(comics|chapters|comments|reviews|comic-categories|bookmarks|follows?|reading-history|homepage|stats)/ {
        proxy_pass http://comic_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    location ~ ^/api/v1/(admin|user)/(notifications|content-templates)/ {
        proxy_pass http://notification_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    location ~ ^/api/v1/(admin|public|user)/(posts|post-categories|post-tags|post-comments)/ {
        proxy_pass http://post_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    location ~ ^/api/v1/(admin|public)/(about|staff|projects|testimonials|partners|gallery|certificates|faqs)/ {
        proxy_pass http://introduction_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    location ~ ^/api/v1/(admin|public)/(banners|banner-locations|contacts)/ {
        proxy_pass http://marketing_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    location /storage/ {
        proxy_pass http://storage_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    location /api/v1/ {
        return 404 '{"statusCode":404,"message":"Route not found"}';
        add_header Content-Type application/json always;
    }

    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
