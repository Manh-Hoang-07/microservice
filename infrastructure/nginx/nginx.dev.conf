# =============================================================================
# Nginx config for DEV mode
# Service chạy trên host (npm start), nginx trong Docker route ngược qua host.docker.internal
# Khi chạy production / full Docker, dùng nginx.conf (upstream trỏ service-name)
# =============================================================================

upstream storage_service {
    server host.docker.internal:3003;
    keepalive 16;
}

upstream web_api_service {
    server host.docker.internal:3006;
    keepalive 16;
}

upstream auth_service {
    server host.docker.internal:3002;
    keepalive 16;
}

upstream config_service {
    server host.docker.internal:3005;
    keepalive 16;
}

upstream comic_service {
    server host.docker.internal:3001;
    keepalive 32;
}

upstream notification_service {
    server host.docker.internal:3004;
    keepalive 16;
}

upstream post_service {
    server host.docker.internal:3007;
    keepalive 16;
}

upstream iam_service {
    server host.docker.internal:3008;
    keepalive 16;
}

upstream introduction_service {
    server host.docker.internal:3010;
    keepalive 16;
}

upstream marketing_service {
    server host.docker.internal:3009;
    keepalive 16;
}

# ── Rate limit zones ──────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Propagate real IP
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # Max body size (file upload: 11MB buffer)
    client_max_body_size 11m;

    # ── Upload → Storage Service (:3003) ──────────────────────────────────────
    location /api/upload/ {
        limit_req zone=upload_limit burst=5 nodelay;

        proxy_pass http://storage_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Homepage → Web API Service (:3006) ────────────────────────────────────
    location = /api/homepage {
        proxy_pass http://web_api_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 10s;
    }

    # ── JWKS (public, no auth) → Auth Service (:3002) ────────────────────────
    location = /.well-known/jwks.json {
        proxy_pass http://auth_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 10s;
    }

    # ── Auth → Auth Service (:3002) ───────────────────────────────────────────
    location /api/auth/ {
        proxy_pass http://auth_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
