# nginx config cho monolith all-in-one container.
# Tất cả services chạy trên localhost, nginx route theo path.

limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=60r/s;

map $http_origin $cors_origin {
    "https://monluxury.vercel.app"  $http_origin;
    "http://localhost:3000"         $http_origin;
    default                         "";
}

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 4;
gzip_min_length 256;
gzip_types application/json application/javascript text/plain text/css;

server {
    listen 80 default_server;
    server_name _;
    server_tokens off;
    client_max_body_size 1m;

    limit_req_status 429;

    add_header Access-Control-Allow-Origin      $cors_origin always;
    add_header Access-Control-Allow-Credentials true always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Correlation-Id" always;
    add_header Access-Control-Max-Age           86400 always;

    if ($request_method = OPTIONS) { return 204; }

    proxy_http_version 1.1;
    proxy_set_header Connection        "";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Max-Age;

    location = /.well-known/jwks.json {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:3001;
    }

    location /api/auth/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:3001;
    }

    location /api/iam/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:3002;
    }

    location /api/config/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://127.0.0.1:3003;
    }

    location /api/storage/ {
        client_max_body_size 11m;
        limit_req zone=upload_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:3004;
        proxy_read_timeout 60s;
    }

    location /api/notifications/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://127.0.0.1:3005;
    }

    location /api/cms/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://127.0.0.1:3006;
    }

    location /api/posts/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://127.0.0.1:3008;
    }

    location /api/comics/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass http://127.0.0.1:3009;
    }

    location /api/web/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://127.0.0.1:3010;
    }

    location /storage/ {
        proxy_pass http://127.0.0.1:3004;
        expires 1d;
        add_header Cache-Control "public, immutable" always;
    }

    location /api/ {
        return 404 '{"statusCode":404,"message":"Route not found"}';
        add_header Content-Type application/json always;
    }

    location ~ ^/health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
