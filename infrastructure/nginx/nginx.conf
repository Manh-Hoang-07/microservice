# Comic Platform — edge nginx config (production).
# Mounted at /etc/nginx/conf.d/default.conf, so all directives below sit
# inside the parent http{} block defined by the upstream nginx image.
#
# Snippets live in /etc/nginx/snippets/ (mounted from infrastructure/nginx/snippets).
#
# ── Routing strategy ──────────────────────────────────────────────────────────
# Every service owns a URL prefix: /api/v1/{service}/...
# Nginx matches by prefix (no regex), then rewrites to strip the service
# segment before forwarding. Backend code stays unchanged.
#
#   External URL                          → Backend receives
#   /api/v1/auth/login                    → /api/v1/auth/login       (no rewrite)
#   /api/v1/comic/admin/comics            → /api/v1/admin/comics
#   /api/v1/config/admin/countries        → /api/v1/admin/countries
#   /api/v1/iam/roles                     → /api/v1/roles
#   /api/v1/notification/user/notifications → /api/v1/user/notifications
#   /api/v1/post/public/posts             → /api/v1/public/posts
#   /api/v1/introduction/public/staff     → /api/v1/public/staff
#   /api/v1/marketing/public/banners      → /api/v1/public/banners
#   /api/v1/storage/upload/file           → /api/v1/upload/file
#   /api/v1/web/homepage                  → /api/v1/homepage
#
# Adding new endpoints inside a service requires ZERO nginx changes.

# ── Upstreams ─────────────────────────────────────────────────────────────────
upstream auth_service          { server auth-service:3001;          keepalive 16; }
upstream comic_service         { server comic-service:3009;         keepalive 32; }
upstream config_service        { server config-service:3003;        keepalive 16; }
upstream iam_service           { server iam-service:3002;           keepalive 16; }
upstream notification_service  { server notification-service:3005;  keepalive 16; }
upstream post_service          { server post-service:3008;          keepalive 16; }
upstream introduction_service  { server introduction-service:3007;  keepalive 16; }
upstream marketing_service     { server marketing-service:3006;     keepalive 16; }
upstream storage_service       { server storage-service:3004;       keepalive 16; }
upstream web_api_service       { server web-api-service:3010;       keepalive 16; }

# ── Rate limit zones ──────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=60r/s;

# ── Sanitize incoming X-Correlation-Id ─────────────────────────────────────────
map $http_x_correlation_id $sanitized_correlation_id {
    default          $request_id;
    "~^[A-Za-z0-9._-]{1,128}$" $http_x_correlation_id;
}

# ── Trust X-Forwarded-* only from these CIDRs ──────────────────────────────────
real_ip_header X-Forwarded-For;
real_ip_recursive on;
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;

# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name _;

    server_tokens off;
    client_max_body_size 1m;

    include /etc/nginx/snippets/security_headers.conf;

    limit_req_status 429;

    # ── JWKS (public, standard path) → Auth Service ───────────────────────────
    location = /.well-known/jwks.json {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://auth_service;
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_read_timeout 10s;
        proxy_cache_valid 200 5m;
        add_header Cache-Control "public, max-age=300" always;
    }

    # ── Auth Service: /api/v1/auth/ ───────────────────────────────────────────
    # Routes starting with /auth/ pass through without rewrite (backend matches).
    # Routes like /admin/users and /user/profile also live in auth-service;
    # the rewrite strips the /auth prefix so the backend receives /api/v1/admin/...
    location /api/v1/auth/ {
        limit_req zone=api_limit burst=20 nodelay;
        rewrite ^/api/v1/auth(/(admin|user|internal)/.*)$ /api/v1$1 break;
        proxy_pass http://auth_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ── Comic Service: /api/v1/comic/ ─────────────────────────────────────────
    location /api/v1/comic/ {
        limit_req zone=api_limit burst=80 nodelay;
        rewrite ^/api/v1/comic(/.*)$ /api/v1$1 break;
        proxy_pass http://comic_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ── Config Service: /api/v1/config/ ───────────────────────────────────────
    location /api/v1/config/ {
        limit_req zone=api_limit burst=40 nodelay;
        rewrite ^/api/v1/config(/.*)$ /api/v1$1 break;
        proxy_pass http://config_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ── IAM Service: /api/v1/iam/ ────────────────────────────────────────────
    location /api/v1/iam/ {
        limit_req zone=api_limit burst=20 nodelay;
        rewrite ^/api/v1/iam(/.*)$ /api/v1$1 break;
        proxy_pass http://iam_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ── Notification Service: /api/v1/notification/ ───────────────────────────
    location /api/v1/notification/ {
        limit_req zone=api_limit burst=40 nodelay;
        rewrite ^/api/v1/notification(/.*)$ /api/v1$1 break;
        proxy_pass http://notification_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ── Post Service: /api/v1/post/ ───────────────────────────────────────────
    location /api/v1/post/ {
        limit_req zone=api_limit burst=40 nodelay;
        rewrite ^/api/v1/post(/.*)$ /api/v1$1 break;
        proxy_pass http://post_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ── Introduction Service: /api/v1/introduction/ ───────────────────────────
    location /api/v1/introduction/ {
        limit_req zone=api_limit burst=40 nodelay;
        rewrite ^/api/v1/introduction(/.*)$ /api/v1$1 break;
        proxy_pass http://introduction_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ── Marketing Service: /api/v1/marketing/ ─────────────────────────────────
    location /api/v1/marketing/ {
        limit_req zone=api_limit burst=40 nodelay;
        rewrite ^/api/v1/marketing(/.*)$ /api/v1$1 break;
        proxy_pass http://marketing_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ── Storage Service: /api/v1/storage/ ─────────────────────────────────────
    location /api/v1/storage/ {
        client_max_body_size 11m;
        limit_req zone=upload_limit burst=5 nodelay;
        rewrite ^/api/v1/storage(/.*)$ /api/v1$1 break;
        proxy_pass http://storage_service;
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Web API Service: /api/v1/web/ ─────────────────────────────────────────
    location /api/v1/web/ {
        limit_req zone=api_limit burst=40 nodelay;
        rewrite ^/api/v1/web(/.*)$ /api/v1$1 break;
        proxy_pass http://web_api_service;
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_read_timeout 10s;
    }

    # ── Static files → Storage Service ────────────────────────────────────────
    location /storage/ {
        proxy_pass http://storage_service;
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_cache_valid 200 1d;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # ── Fallback for unknown /api/ routes ─────────────────────────────────────
    location /api/v1/ {
        return 404 '{"statusCode":404,"message":"Route not found"}';
        add_header Content-Type application/json always;
    }

    # ── LB / probe ────────────────────────────────────────────────────────────
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
