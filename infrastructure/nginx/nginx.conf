# Comic Platform — edge nginx config (production).
# Mounted at /etc/nginx/conf.d/default.conf, so all directives below sit
# inside the parent http{} block defined by the upstream nginx image.
#
# Snippets live in /etc/nginx/snippets/ (mounted from infrastructure/nginx/snippets).

# ── Upstreams ─────────────────────────────────────────────────────────────────
upstream storage_service       { server storage-service:3003;       keepalive 16; }
upstream web_api_service       { server web-api-service:3006;       keepalive 16; }
upstream auth_service          { server auth-service:3002;          keepalive 16; }
upstream config_service        { server config-service:3005;        keepalive 16; }
upstream comic_service         { server comic-service:3001;         keepalive 32; }
upstream notification_service  { server notification-service:3004;  keepalive 16; }
upstream post_service          { server post-service:3007;          keepalive 16; }
upstream introduction_service  { server introduction-service:3010;  keepalive 16; }
upstream marketing_service     { server marketing-service:3009;     keepalive 16; }
upstream iam_service           { server iam-service:3008;           keepalive 16; }

# ── Rate limit zones ──────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=60r/s;

# ── Sanitize incoming X-Correlation-Id ─────────────────────────────────────────
# Only honor a client-supplied correlation id when it looks like a UUID/short
# token; otherwise fall through to nginx's $request_id. Defense against header
# injection / log poisoning via control characters.
map $http_x_correlation_id $sanitized_correlation_id {
    default          $request_id;
    "~^[A-Za-z0-9._-]{1,128}$" $http_x_correlation_id;
}

# ── Trust X-Forwarded-* only from these CIDRs ──────────────────────────────────
# Tighten before going live: list ONLY the IPs of your CDN / load balancer.
# As-is (private ranges) is safe behind a docker network or VPC, NOT behind a
# public LB unless that LB's IPs are added.
real_ip_header X-Forwarded-For;
real_ip_recursive on;
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;

# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name _;

    # Hide nginx version (also in main.conf via server_tokens off if available)
    server_tokens off;

    # Default body limit; overridden on the upload route
    client_max_body_size 1m;

    include /etc/nginx/snippets/security_headers.conf;

    # Apply API rate limit globally to anything under /api/
    limit_req_status 429;

    # ── Upload → Storage Service ──────────────────────────────────────────────
    location /api/v1/upload/ {
        client_max_body_size 11m;
        limit_req zone=upload_limit burst=5 nodelay;
        proxy_pass http://storage_service;
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── JWKS (public) → Auth Service ──────────────────────────────────────────
    location = /.well-known/jwks.json {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://auth_service;
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_read_timeout 10s;
        # Cache JWKS in nginx — it changes only on key rotation
        proxy_cache_valid 200 5m;
        add_header Cache-Control "public, max-age=300" always;
    }

    # ── Homepage (aggregator) ─────────────────────────────────────────────────
    location = /api/v1/homepage {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://web_api_service;
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_read_timeout 10s;
    }

    # ── Auth + Users → Auth Service ───────────────────────────────────────────
    location ~ ^/api/v1/(auth|users)/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://auth_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ── IAM (RBAC) → IAM Service ──────────────────────────────────────────────
    location ~ ^/api/v1/(roles|permissions|groups|contexts|rbac|user-roles)/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://iam_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ── Config & geo lookups → Config Service ─────────────────────────────────
    location ~ ^/api/v1/(config|menus|countries|provinces|wards)/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://config_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ── Comics (admin/public/user) → Comic Service ────────────────────────────
    # Catches all the comic-domain paths in one block: comics, chapters,
    # comments, reviews, comic-categories, bookmarks, follows, reading-history,
    # stats, homepage.
    location ~ ^/api/v1/(admin|public|user)/(comics|chapters|comments|reviews|comic-categories|bookmarks|follows?|reading-history|homepage|stats)/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass http://comic_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ── Notifications + content templates → Notification Service ──────────────
    location ~ ^/api/v1/(admin|user)/(notifications|content-templates)/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://notification_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ── Posts → Post Service ──────────────────────────────────────────────────
    location ~ ^/api/v1/(admin|public|user)/(posts|post-categories|post-tags|post-comments)/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://post_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ── Introduction → Introduction Service ───────────────────────────────────
    location ~ ^/api/v1/(admin|public)/(about|staff|projects|testimonials|partners|gallery|certificates|faqs)/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://introduction_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ── Marketing → Marketing Service ─────────────────────────────────────────
    location ~ ^/api/v1/(admin|public)/(banners|banner-locations|contacts)/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://marketing_service;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ── Static files → Storage Service ────────────────────────────────────────
    location /storage/ {
        proxy_pass http://storage_service;
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_cache_valid 200 1d;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # ── Fallback for unknown /api/ routes ─────────────────────────────────────
    location /api/v1/ {
        return 404 '{"statusCode":404,"message":"Route not found"}';
        add_header Content-Type application/json always;
    }

    # ── LB / probe ────────────────────────────────────────────────────────────
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
