upstream main_service {
    server api:8000;
    keepalive 32;
}

upstream storage_service {
    server storage-service:3003;
    keepalive 16;
}

upstream bff_service {
    server bff-service:3006;
    keepalive 16;
}

# ── Rate limit zones ──────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Propagate real IP
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # Max body size (file upload: 11MB buffer)
    client_max_body_size 11m;

    # ── Upload → Storage Service (:3003) ──────────────────────────────────────
    location /api/upload/ {
        limit_req zone=upload_limit burst=5 nodelay;

        proxy_pass http://storage_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Homepage → BFF Service (:3006) ────────────────────────────────────────
    location = /api/homepage {
        proxy_pass http://bff_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 10s;
    }

    # ── Auth Service health (future :3002) ────────────────────────────────────
    # location /api/auth/ {
    #     proxy_pass http://auth_service;
    # }

    # ── Comic Service health (future :3001) ───────────────────────────────────
    # location /api/comics/ {
    #     proxy_pass http://comic_service;
    # }

    # ── Everything else → Main Service (:8000) ────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://main_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;

        # Propagate user context for inter-service calls
        proxy_set_header X-User-Id $http_x_user_id;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Static files (if served from main service)
    location /storage/ {
        proxy_pass http://main_service;
        proxy_http_version 1.1;
        proxy_cache_valid 200 1d;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Health probe for load balancer
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
