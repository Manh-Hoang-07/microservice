# Shared proxy snippet — keeps every `location` block DRY.
# Usage:    include /etc/nginx/snippets/proxy_common.conf;

proxy_http_version 1.1;
proxy_set_header Connection "";
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Request-Id $request_id;

# CRITICAL: never let a client spoof identity/correlation headers.
# X-User-Id is set internally by services AFTER JWT validation; if we
# proxy whatever the client sent, anyone could impersonate any user
# (the `$http_x_user_id` pattern in the old config did exactly this).
# Set to empty string so backends see no header at all.
proxy_set_header X-User-Id "";

# X-Correlation-Id: sanitize via $http_x_correlation_id only when it
# matches a safe shape (UUID-ish). Otherwise mint a fresh one from
# nginx's $request_id so the trace is still correlated end-to-end.
proxy_set_header X-Correlation-Id $sanitized_correlation_id;

# Timeouts intentionally NOT set here — nginx forbids re-declaring the same
# proxy_*_timeout directive in the same location once it's been set, and
# every `location` block already needs to pick its own values (uploads need
# 60s, JWKS needs 10s, etc.). Each `location` MUST set:
#   proxy_connect_timeout, proxy_send_timeout, proxy_read_timeout

# Don't leak backend identifying headers downstream
proxy_hide_header X-Powered-By;
proxy_hide_header Server;
