# Security headers applied to every response.
# Include via:  include /etc/nginx/snippets/security_headers.conf;

# Hide nginx version (also set in main http{} via server_tokens off)
add_header X-Content-Type-Options nosniff always;
add_header X-Frame-Options DENY always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# X-XSS-Protection is deprecated and IGNORED by modern browsers — its
# legacy filter has been removed everywhere except old IE/Edge. Removing
# silences confusion in Lighthouse/Mozilla Observatory reports without
# changing real behavior.

# Strict-Transport-Security — only meaningful when site is served over HTTPS.
# Uncomment after TLS is in front of nginx (CDN, ALB, or local cert):
# add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

# Content-Security-Policy: tight default for an API-only edge.
# Frontend HTML lives elsewhere; this stops anyone bouncing scripts / iframes
# off the API origin. Loosen if you start serving HTML directly from nginx.
add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'" always;

# Permissions-Policy: deny common high-risk APIs by default for non-FE responses.
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
