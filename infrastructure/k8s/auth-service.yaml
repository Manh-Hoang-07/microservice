# Sample Deployment + Service + HPA for auth-service.
# Copy this file per service and adjust SERVICE_NAME / SERVICE_PORT / replicas.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: comic-platform
  labels:
    app: auth-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: auth-service
          image: ghcr.io/your-org/auth-service:latest # replace
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
              name: http
          envFrom:
            - configMapRef:
                name: comic-platform-config
            - secretRef:
                name: comic-platform-secrets
          env:
            - name: PORT
              value: "3002"
            - name: SERVICE_NAME
              value: "auth-service"
            - name: DATABASE_URL
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@auth-db.comic-platform.svc.cluster.local:5432/auth_db?connection_limit=5&pool_timeout=30"
            - name: REDIS_URL
              value: "redis://auth-redis.comic-platform.svc.cluster.local:6379"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          startupProbe:
            httpGet: { path: /api/health/live, port: 3002 }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24 # 2 min
          livenessProbe:
            httpGet: { path: /api/health/live, port: 3002 }
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /api/health/ready, port: 3002 }
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"] # let LB drain before SIGTERM
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: comic-platform
spec:
  selector:
    app: auth-service
  ports:
    - port: 3002
      targetPort: 3002
      name: http
  type: ClusterIP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-service-pdb
  namespace: comic-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: auth-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: comic-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
