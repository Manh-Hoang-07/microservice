# Template for shared secrets. In production, manage via External Secrets
# Operator + Vault/AWS Secrets Manager — this file is only for bootstrapping
# a local cluster (kind/minikube).
#
# Replace the base64 values before applying:
#   echo -n "your-strong-password" | base64
apiVersion: v1
kind: Secret
metadata:
  name: comic-platform-secrets
  namespace: comic-platform
type: Opaque
stringData:
  POSTGRES_PASSWORD: "REPLACE_ME_strong-postgres-password"
  INTERNAL_API_SECRET: "REPLACE_ME_>=32_chars_openssl_rand_base64_32"
  GOOGLE_OAUTH_STATE_SECRET: "REPLACE_ME_>=32_chars"
  JWT_PRIVATE_KEY_PEM: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_ME
    -----END PRIVATE KEY-----
  JWT_PUBLIC_KEY_PEM: |
    -----BEGIN PUBLIC KEY-----
    REPLACE_ME
    -----END PUBLIC KEY-----
