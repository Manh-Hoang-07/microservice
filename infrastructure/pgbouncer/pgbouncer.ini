; PgBouncer config — transaction-mode pooling in front of all per-service
; Postgres instances. One PgBouncer container handles all 8 databases.
;
; To enable:
;   1. Create infrastructure/pgbouncer/userlist.txt (see userlist.txt.example)
;   2. docker compose --profile pgbouncer up -d pgbouncer
;   3. Switch each service's DATABASE_URL to point at pgbouncer:6432/<db_name>
;      and set ?connection_limit=1 (Prisma needs only one client conn since
;      PgBouncer multiplexes underneath).
;   4. KEEP DIRECT_URL pointed at the real Postgres (for prisma migrate deploy).

[databases]
auth_db          = host=auth-db          port=5432 dbname=auth_db
comic_db         = host=comic-db         port=5432 dbname=comic_db
notification_db  = host=notification-db  port=5432 dbname=notification_db
config_db        = host=config-db        port=5432 dbname=config_db
post_db          = host=post-db          port=5432 dbname=post_db
introduction_db  = host=introduction-db  port=5432 dbname=introduction_db
marketing_db     = host=marketing-db     port=5432 dbname=marketing_db
iam_db           = host=iam-db           port=5432 dbname=iam_db

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; Auth: SCRAM-SHA-256 (modern Postgres default). userlist.txt holds the
; pre-hashed (or plaintext) credentials.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Transaction-mode: most efficient for short OLTP queries. Prisma
; transactions still work because they're inside a single SQL transaction.
; Long-running queries / temp tables / SET LOCAL won't survive across
; transaction boundaries — fine for this app's pattern.
pool_mode = transaction

; Sized for ~10 services × peak burst. Start conservative; raise once you
; have real metrics from `SHOW POOLS;` against the bouncer.
max_client_conn = 500
default_pool_size = 25
reserve_pool_size = 5
reserve_pool_timeout = 3

; Server connection lifetime — recycle idle backends so we don't pin them.
server_idle_timeout = 600
server_lifetime = 3600

; Keep verbose enough to triage but not so noisy it floods logs.
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60
