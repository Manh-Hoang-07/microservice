name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Verify lockfile is in sync
        run: npm ci --dry-run

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build shared packages
        run: npm run build:shared

      - name: Generate Prisma clients
        run: npm run prisma:generate

      - name: Build all services
        run: npm run build:apps

      - name: Audit (high+ severity only)
        run: npm audit --audit-level=high
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    strategy:
      matrix:
        service:
          - { name: auth-service, port: 3002 }
          - { name: comic-service, port: 3001 }
          - { name: config-service, port: 3005 }
          - { name: iam-service, port: 3008 }
          - { name: introduction-service, port: 3010 }
          - { name: marketing-service, port: 3009 }
          - { name: notification-service, port: 3004 }
          - { name: post-service, port: 3007 }
          - { name: storage-service, port: 3003 }
          - { name: web-api-service, port: 3006 }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infrastructure/docker/Dockerfile.service
          build-args: |
            SERVICE_NAME=${{ matrix.service.name }}
            SERVICE_PORT=${{ matrix.service.port }}
          push: false
          tags: ${{ matrix.service.name }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
