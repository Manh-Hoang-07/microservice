services:
  # ══ Kafka Stack ═══════════════════════════════════════════════════════════════
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: comic-zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: comic-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9093:9093"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: comic-kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: comic-platform
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  # ══ PostgreSQL — 1 DB per service ═════════════════════════════════════════════
  main-db:
    image: postgres:15-alpine
    container_name: comic-main-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: main_db
    ports:
      - "5432:5432"
    volumes:
      - main_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d main_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-db:
    image: postgres:15-alpine
    container_name: comic-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  comic-db:
    image: postgres:15-alpine
    container_name: comic-comic-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: comic_db
    ports:
      - "5434:5432"
    volumes:
      - comic_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d comic_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  notif-db:
    image: postgres:15-alpine
    container_name: comic-notif-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: notif_db
    ports:
      - "5435:5432"
    volumes:
      - notif_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notif_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  config-db:
    image: postgres:15-alpine
    container_name: comic-config-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: config_db
    ports:
      - "5436:5432"
    volumes:
      - config_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d config_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ══ Redis — 1 instance per service ════════════════════════════════════════════
  main-redis:
    image: redis:7-alpine
    container_name: comic-main-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - main_redis_data:/data
    command: redis-server --appendonly yes

  auth-redis:
    image: redis:7-alpine
    container_name: comic-auth-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - auth_redis_data:/data
    command: redis-server --appendonly yes

  comic-redis:
    image: redis:7-alpine
    container_name: comic-comic-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - comic_redis_data:/data
    command: redis-server --appendonly yes

  notif-redis:
    image: redis:7-alpine
    container_name: comic-notif-redis
    restart: unless-stopped
    ports:
      - "6382:6379"
    volumes:
      - notif_redis_data:/data
    command: redis-server --appendonly yes

  bff-redis:
    image: redis:7-alpine
    container_name: comic-bff-redis
    restart: unless-stopped
    ports:
      - "6383:6379"
    volumes:
      - bff_redis_data:/data
    command: redis-server --appendonly yes

  # ══ API Gateway (Nginx) ═══════════════════════════════════════════════════════
  nginx:
    image: nginx:1.25-alpine
    container_name: comic-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
      - storage-service
      - bff-service
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ══ Storage Service (:3003) ═══════════════════════════════════════════════════
  storage-service:
    build:
      context: .
      dockerfile: apps/storage-service/Dockerfile
    container_name: comic-storage-service
    restart: unless-stopped
    depends_on:
      main-redis:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3003
      GLOBAL_PREFIX: ${GLOBAL_PREFIX:-api}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_MAX_FILE_SIZE: ${STORAGE_MAX_FILE_SIZE:-10485760}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-}
      STORAGE_S3_ACCESS_KEY_ID: ${STORAGE_S3_ACCESS_KEY_ID:-}
      STORAGE_S3_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY:-}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-}
      STORAGE_S3_FORCE_PATH_STYLE: ${STORAGE_S3_FORCE_PATH_STYLE:-true}
      STORAGE_S3_BASE_URL: ${STORAGE_S3_BASE_URL:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      AUTH_JWKS_URL: ${AUTH_JWKS_URL:-}
      UPLOAD_DEST: ${UPLOAD_DEST:-./storage/uploads}
    ports:
      - "3003:3003"
    volumes:
      - storage_uploads:/app/storage/uploads

  # ══ BFF Service (:3006) ═══════════════════════════════════════════════════════
  bff-service:
    build:
      context: .
      dockerfile: apps/bff-service/Dockerfile
    container_name: comic-bff-service
    restart: unless-stopped
    depends_on:
      bff-redis:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3006
      GLOBAL_PREFIX: ${GLOBAL_PREFIX:-api}
      COMIC_SERVICE_URL: ${COMIC_SERVICE_URL:-http://api:8000/api}
      MAIN_SERVICE_URL: ${MAIN_SERVICE_URL:-http://api:8000/api}
      BFF_REDIS_URL: redis://bff-redis:6379
      SERVICE_TIMEOUT_MS: ${SERVICE_TIMEOUT_MS:-5000}
      AUTH_JWKS_URL: ${AUTH_JWKS_URL:-}
    ports:
      - "3006:3006"

  # ══ Main Service (monolith — Phase 0) ═════════════════════════════════════════
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comic-api
    restart: unless-stopped
    depends_on:
      main-db:
        condition: service_healthy
      main-redis:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      GLOBAL_PREFIX: ${GLOBAL_PREFIX}
      CORS_ENABLED: ${CORS_ENABLED}
      CORS_ORIGINS: ${CORS_ORIGINS}
      APP_TIMEZONE: ${APP_TIMEZONE}

      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      REDIS_URL: ${REDIS_URL}
      CACHE_DRIVER: ${CACHE_DRIVER}
      THROTTLE_DISABLED: ${THROTTLE_DISABLED}

      # Auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}

      # Microservice toggles
      AUTH_MODE: ${AUTH_MODE:-local}
      EVENT_DRIVER: ${EVENT_DRIVER:-local}

      # Auth Service (distributed mode)
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-}
      AUTH_JWKS_URL: ${AUTH_JWKS_URL:-}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-}

      # Kafka
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-comic-platform-main}

      # Storage
      STORAGE_TYPE: ${STORAGE_TYPE}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET}
      STORAGE_S3_ACCESS_KEY_ID: ${STORAGE_S3_ACCESS_KEY_ID}
      STORAGE_S3_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT}
      STORAGE_S3_FORCE_PATH_STYLE: ${STORAGE_S3_FORCE_PATH_STYLE}
      STORAGE_S3_BASE_URL: ${STORAGE_S3_BASE_URL}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      GOOGLE_FRONTEND_URL: ${GOOGLE_FRONTEND_URL}

      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - "8000:8000"

volumes:
  # Storage
  storage_uploads:
  # Kafka
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  # PostgreSQL
  main_db_data:
  auth_db_data:
  comic_db_data:
  notif_db_data:
  config_db_data:
  # Redis
  main_redis_data:
  auth_redis_data:
  comic_redis_data:
  notif_redis_data:
  bff_redis_data:
