services:
  # ══ Kafka Stack ═══════════════════════════════════════════════════════════════
  kafka:
    image: confluentinc/cp-kafka:8.2.0
    container_name: comic-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      # KRaft combined mode (broker + controller in single node)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Topic defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: comic-kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: comic-platform
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ══ PostgreSQL — 1 DB per service ═════════════════════════════════════════════
  auth-db:
    image: postgres:15-alpine
    container_name: comic-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  comic-db:
    image: postgres:15-alpine
    container_name: comic-comic-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: comic_db
    ports:
      - "5434:5432"
    volumes:
      - comic_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d comic_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  notification-db:
    image: postgres:15-alpine
    container_name: comic-notification-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: notification_db
    ports:
      - "5435:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  config-db:
    image: postgres:15-alpine
    container_name: comic-config-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: config_db
    ports:
      - "5436:5432"
    volumes:
      - config_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d config_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  post-db:
    image: postgres:15-alpine
    container_name: comic-post-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: post_db
    ports:
      - "5438:5432"
    volumes:
      - post_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d post_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  introduction-db:
    image: postgres:15-alpine
    container_name: comic-introduction-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: introduction_db
    ports:
      - "5439:5432"
    volumes:
      - introduction_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d introduction_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  marketing-db:
    image: postgres:15-alpine
    container_name: comic-marketing-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: marketing_db
    ports:
      - "5440:5432"
    volumes:
      - marketing_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketing_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  iam-db:
    image: postgres:15-alpine
    container_name: comic-iam-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: iam_db
    ports:
      - "5441:5432"
    volumes:
      - iam_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iam_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ══ Redis — 1 instance per service ════════════════════════════════════════════
  auth-redis:
    image: redis:7-alpine
    container_name: comic-auth-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - auth_redis_data:/data
    command: redis-server --appendonly yes

  comic-redis:
    image: redis:7-alpine
    container_name: comic-comic-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - comic_redis_data:/data
    command: redis-server --appendonly yes

  notification-redis:
    image: redis:7-alpine
    container_name: comic-notification-redis
    restart: unless-stopped
    ports:
      - "6382:6379"
    volumes:
      - notification_redis_data:/data
    command: redis-server --appendonly yes

  post-redis:
    image: redis:7-alpine
    container_name: comic-post-redis
    restart: unless-stopped
    ports:
      - "6384:6379"
    volumes:
      - post_redis_data:/data
    command: redis-server --appendonly yes

  web-api-redis:
    image: redis:7-alpine
    container_name: comic-web-api-redis
    restart: unless-stopped
    ports:
      - "6383:6379"
    volumes:
      - web_api_redis_data:/data
    command: redis-server --appendonly yes

  iam-redis:
    image: redis:7-alpine
    container_name: comic-iam-redis
    restart: unless-stopped
    ports:
      - "6385:6379"
    volumes:
      - iam_redis_data:/data
    command: redis-server --appendonly yes

  # ══ PgBouncer (opt-in — `--profile pgbouncer`) ═══════════════════════════════
  # Transaction-mode pool in front of all per-service DBs.
  # Enable when scaling beyond 1 replica per service or seeing connection
  # exhaustion alerts. See infrastructure/pgbouncer/ for setup.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: comic-pgbouncer
    profiles: ["pgbouncer"]
    restart: unless-stopped
    ports:
      - "6432:6432"
    volumes:
      - ./infrastructure/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infrastructure/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      - auth-db
      - comic-db
      - notification-db
      - config-db
      - post-db
      - introduction-db
      - marketing-db
      - iam-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ══ Observability ═════════════════════════════════════════════════════════════
  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: comic-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # ══ API Gateway (Nginx) — full Docker mode ═══════════════════════════════════
  nginx:
    image: nginx:1.25-alpine
    container_name: comic-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - storage-service
      - web-api-service
      - auth-service
      - config-service
      - comic-service
      - notification-service
      - post-service
      - introduction-service
      - marketing-service
      - iam-service
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/nginx/snippets:/etc/nginx/snippets:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ══ API Gateway (Nginx) — DEV mode ═══════════════════════════════════════════
  # Service chạy host (npm start), nginx route ngược qua host.docker.internal.
  # Chỉ start khi gọi: docker compose --profile dev up -d nginx-dev
  nginx-dev:
    image: nginx:1.25-alpine
    container_name: comic-nginx-dev
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./infrastructure/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/nginx/snippets:/etc/nginx/snippets:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ══ Storage Service (:3003) ═══════════════════════════════════════════════════
  storage-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: storage-service
        SERVICE_PORT: "3003"
    container_name: comic-storage-service
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3003
      GLOBAL_PREFIX: ${GLOBAL_PREFIX:-api/v1}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_MAX_FILE_SIZE: ${STORAGE_MAX_FILE_SIZE:-10485760}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-}
      STORAGE_S3_ACCESS_KEY_ID: ${STORAGE_S3_ACCESS_KEY_ID:-}
      STORAGE_S3_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY:-}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-}
      STORAGE_S3_FORCE_PATH_STYLE: ${STORAGE_S3_FORCE_PATH_STYLE:-true}
      STORAGE_S3_BASE_URL: ${STORAGE_S3_BASE_URL:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      AUTH_JWKS_URL: ${AUTH_JWKS_URL:-}
      UPLOAD_DEST: ${UPLOAD_DEST:-./storage/uploads}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3003:3003"
    volumes:
      - storage_uploads:/app/storage/uploads

  # ══ Auth Service (:3002) ══════════════════════════════════════════════════════
  auth-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: auth-service
        SERVICE_PORT: "3002"
    container_name: comic-auth-service
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      auth-db:
        condition: service_healthy
      auth-redis:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3002
      GLOBAL_PREFIX: api/v1
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@auth-db:5432/auth_db?connection_limit=5&pool_timeout=30
      REDIS_URL: redis://auth-redis:6379
      JWT_PRIVATE_KEY_PEM: ${JWT_PRIVATE_KEY_PEM:-}
      JWT_PUBLIC_KEY_PEM: ${JWT_PUBLIC_KEY_PEM:-}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      JWT_ISSUER: ${JWT_ISSUER:-auth-service}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-comic-platform}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      GOOGLE_FRONTEND_URL: ${GOOGLE_FRONTEND_URL:-}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      EVENT_DRIVER: ${EVENT_DRIVER:-local}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set (>=32 chars)}
      AUTH_JWKS_URL: http://auth-service:3002/.well-known/jwks.json
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3002:3002"

  # ══ Config Service (:3005) ════════════════════════════════════════════════════
  config-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: config-service
        SERVICE_PORT: "3005"
    container_name: comic-config-service
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      config-db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3005
      GLOBAL_PREFIX: api/v1
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@config-db:5432/config_db?connection_limit=5&pool_timeout=30
      AUTH_JWKS_URL: http://auth-service:3002/.well-known/jwks.json
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set (>=32 chars)}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3005:3005"

  # ══ Web API Service (:3006) — aggregator for FE (homepage, search) ═══════════
  web-api-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: web-api-service
        SERVICE_PORT: "3006"
    container_name: comic-web-api-service
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      web-api-redis:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3006
      GLOBAL_PREFIX: ${GLOBAL_PREFIX:-api/v1}
      COMIC_SERVICE_URL: ${COMIC_SERVICE_URL:-http://comic-service:3001/api/v1}
      POST_SERVICE_URL: ${POST_SERVICE_URL:-http://post-service:3007/api/v1}
      REDIS_URL: redis://web-api-redis:6379
      SERVICE_TIMEOUT_MS: ${SERVICE_TIMEOUT_MS:-5000}
      AUTH_JWKS_URL: ${AUTH_JWKS_URL:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3006:3006"

  # ══ Comic Service (:3001) ═════════════════════════════════════════════════��═
  comic-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: comic-service
        SERVICE_PORT: "3001"
    container_name: comic-comic-service
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      comic-db:
        condition: service_healthy
      comic-redis:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      GLOBAL_PREFIX: api/v1
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@comic-db:5432/comic_db?connection_limit=5&pool_timeout=30
      REDIS_URL: redis://comic-redis:6379
      AUTH_JWKS_URL: http://auth-service:3002/.well-known/jwks.json
      KAFKA_BROKERS: kafka:9092
      EVENT_DRIVER: ${EVENT_DRIVER:-local}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3001:3001"

  # ══ Notification Service (:3004) ═══════════════════════════════════════════
  notification-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: notification-service
        SERVICE_PORT: "3004"
    container_name: comic-notification-service
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      notification-db:
        condition: service_healthy
      notification-redis:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3004
      GLOBAL_PREFIX: api/v1
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@notification-db:5432/notification_db?connection_limit=5&pool_timeout=30
      REDIS_URL: redis://notification-redis:6379
      AUTH_JWKS_URL: http://auth-service:3002/.well-known/jwks.json
      KAFKA_BROKERS: kafka:9092
      KAFKA_GROUP_ID: notification-service
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3004:3004"

  # ══ Post Service (:3007) ═════════════════════════════════════════════════
  post-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: post-service
        SERVICE_PORT: "3007"
    container_name: comic-post-service
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      post-db:
        condition: service_healthy
      post-redis:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3007
      GLOBAL_PREFIX: api/v1
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@post-db:5432/post_db?connection_limit=5&pool_timeout=30
      REDIS_URL: redis://post-redis:6379
      AUTH_JWKS_URL: http://auth-service:3002/.well-known/jwks.json
      KAFKA_BROKERS: kafka:9092
      EVENT_DRIVER: ${EVENT_DRIVER:-local}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3007:3007"

  # ══ Introduction Service (:3010) ═══════════════════════════════════════════
  introduction-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: introduction-service
        SERVICE_PORT: "3010"
    container_name: comic-introduction-service
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      introduction-db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3010
      GLOBAL_PREFIX: api/v1
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@introduction-db:5432/introduction_db?connection_limit=5&pool_timeout=30
      AUTH_JWKS_URL: http://auth-service:3002/.well-known/jwks.json
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3010:3010"

  # ══ Marketing Service (:3009) ══════════════════════════════════════════════
  marketing-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: marketing-service
        SERVICE_PORT: "3009"
    container_name: comic-marketing-service
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      marketing-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3009
      GLOBAL_PREFIX: api/v1
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@marketing-db:5432/marketing_db?connection_limit=5&pool_timeout=30
      AUTH_JWKS_URL: http://auth-service:3002/.well-known/jwks.json
      KAFKA_BROKERS: kafka:9092
      EVENT_DRIVER: ${EVENT_DRIVER:-local}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3009:3009"

  # ══ IAM Service (:3008) ════════════════════════════════════════════════════
  iam-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: iam-service
        SERVICE_PORT: "3008"
    container_name: comic-iam-service
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      iam-db:
        condition: service_healthy
      iam-redis:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3008
      GLOBAL_PREFIX: api/v1
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@iam-db:5432/iam_db?connection_limit=5&pool_timeout=30
      REDIS_URL: redis://iam-redis:6379
      AUTH_JWKS_URL: http://auth-service:3002/.well-known/jwks.json
      RBAC_CACHE_TTL: ${RBAC_CACHE_TTL:-86400}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set (>=32 chars)}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3008:3008"

