# docker-compose.dev.yml — 1 lệnh chạy toàn bộ stack
#
# DB, Redis dùng remote (từ .env của từng service).
# Kafka chạy trong Docker.
#
# Cách dùng:
#   docker compose -f docker-compose.dev.yml up -d --build
#   docker compose -f docker-compose.dev.yml down
#   docker compose -f docker-compose.dev.yml logs -f <service-name>

services:
  # ── Kafka (KRaft, không cần Zookeeper) ────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:8.2.0
    container_name: comic-kafka
    restart: unless-stopped
    ports:
      - "127.0.0.1:9092:9092"
    deploy:
      resources:
        limits:
          memory: 768M
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Kafka UI ───────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: comic-kafka-ui
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: comic-platform
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      AUTH_TYPE: LOGIN_FORM
      SPRING_SECURITY_USER_NAME: admin
      SPRING_SECURITY_USER_PASSWORD: admin
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Nginx — API Gateway ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: comic-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/nginx/snippets:/etc/nginx/snippets:ro
    depends_on:
      - auth-service
      - iam-service
      - config-service
      - storage-service
      - notification-service
      - marketing-service
      - introduction-service
      - post-service
      - comic-service
      - web-api-service
    deploy:
      resources:
        limits:
          memory: 64M

  # ── Auth Service (:3001) ───────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: auth-service
        SERVICE_PORT: "3001"
    container_name: comic-auth-service
    restart: unless-stopped
    env_file:
      - apps/auth-service/.env
    environment:
      SERVICE_NAME: auth-service
      GLOBAL_PREFIX: api/auth
      AUTH_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
      KAFKA_BROKERS: kafka:9092
      KAFKA_REPLICATION_FACTOR: "1"
      KAFKA_CA_CERTIFICATE: ""
      KAFKA_ACCESS_CERTIFICATE: ""
      KAFKA_ACCESS_KEY: ""
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # ── IAM Service (:3002) ────────────────────────────────────────────────────
  iam-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: iam-service
        SERVICE_PORT: "3002"
    container_name: comic-iam-service
    restart: unless-stopped
    env_file:
      - apps/iam-service/.env
    environment:
      SERVICE_NAME: iam-service
      GLOBAL_PREFIX: api/iam
      AUTH_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Config Service (:3003) ─────────────────────────────────────────────────
  config-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: config-service
        SERVICE_PORT: "3003"
    container_name: comic-config-service
    restart: unless-stopped
    env_file:
      - apps/config-service/.env
    environment:
      SERVICE_NAME: config-service
      GLOBAL_PREFIX: api/config
      AUTH_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Storage Service (:3004) ────────────────────────────────────────────────
  storage-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: storage-service
        SERVICE_PORT: "3004"
    container_name: comic-storage-service
    restart: unless-stopped
    env_file:
      - apps/storage-service/.env
    environment:
      SERVICE_NAME: storage-service
      GLOBAL_PREFIX: api/storage
      AUTH_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
    volumes:
      - storage_uploads:/app/storage/uploads
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Notification Service (:3005) ───────────────────────────────────────────
  notification-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: notification-service
        SERVICE_PORT: "3005"
    container_name: comic-notification-service
    restart: unless-stopped
    env_file:
      - apps/notification-service/.env
    environment:
      SERVICE_NAME: notification-service
      GLOBAL_PREFIX: api/notifications
      AUTH_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
      KAFKA_BROKERS: kafka:9092
      KAFKA_CA_CERTIFICATE: ""
      KAFKA_ACCESS_CERTIFICATE: ""
      KAFKA_ACCESS_KEY: ""
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Marketing Service (:3006) ──────────────────────────────────────────────
  marketing-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: marketing-service
        SERVICE_PORT: "3006"
    container_name: comic-marketing-service
    restart: unless-stopped
    env_file:
      - apps/marketing-service/.env
    environment:
      SERVICE_NAME: marketing-service
      GLOBAL_PREFIX: api/marketing
      AUTH_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
      KAFKA_BROKERS: kafka:9092
      KAFKA_CA_CERTIFICATE: ""
      KAFKA_ACCESS_CERTIFICATE: ""
      KAFKA_ACCESS_KEY: ""
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Introduction Service (:3007) ───────────────────────────────────────────
  introduction-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: introduction-service
        SERVICE_PORT: "3007"
    container_name: comic-introduction-service
    restart: unless-stopped
    env_file:
      - apps/introduction-service/.env
    environment:
      SERVICE_NAME: introduction-service
      GLOBAL_PREFIX: api/introduction
      AUTH_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Post Service (:3008) ───────────────────────────────────────────────────
  post-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: post-service
        SERVICE_PORT: "3008"
    container_name: comic-post-service
    restart: unless-stopped
    env_file:
      - apps/post-service/.env
    environment:
      SERVICE_NAME: post-service
      GLOBAL_PREFIX: api/posts
      AUTH_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
      KAFKA_BROKERS: kafka:9092
      KAFKA_CA_CERTIFICATE: ""
      KAFKA_ACCESS_CERTIFICATE: ""
      KAFKA_ACCESS_KEY: ""
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Comic Service (:3009) ──────────────────────────────────────────────────
  comic-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: comic-service
        SERVICE_PORT: "3009"
    container_name: comic-comic-service
    restart: unless-stopped
    env_file:
      - apps/comic-service/.env
    environment:
      SERVICE_NAME: comic-service
      GLOBAL_PREFIX: api/comics
      AUTH_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
      KAFKA_BROKERS: kafka:9092
      KAFKA_CA_CERTIFICATE: ""
      KAFKA_ACCESS_CERTIFICATE: ""
      KAFKA_ACCESS_KEY: ""
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Web API Service (:3010) ────────────────────────────────────────────────
  web-api-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: web-api-service
        SERVICE_PORT: "3010"
    container_name: comic-web-api-service
    restart: unless-stopped
    env_file:
      - apps/web-api-service/.env
    environment:
      SERVICE_NAME: web-api-service
      GLOBAL_PREFIX: api/web
      COMIC_SERVICE_URL: http://comic-service:3009/api/comics
      POST_SERVICE_URL: http://post-service:3008/api/posts
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  kafka_data:
  storage_uploads:
